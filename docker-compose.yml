services:
  redis:
    image: redis:7-alpine
    container_name: veronica-redis
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: veronica-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"

  veronica:
    build: .
    container_name: veronica-core
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./:/app
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    depends_on:
      - redis
      - ollama
    command: npm run start

volumes:
  ollama_data:
